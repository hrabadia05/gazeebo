<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gazeebo - Photo Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-full flex flex-col">
    <!-- Navigation Bar -->
    <header class="border-b border-white/10 px-6 py-4 flex justify-between items-center bg-slate-900/50 backdrop-blur-md">
        <h1 class="text-xl font-bold tracking-tight">Gazeebo Vault</h1>
        <div class="flex gap-4 items-center">
            <a href="index.html" class="text-sm text-slate-400 hover:text-white transition">Dashboard</a>
            <button onclick="logout()" class="text-sm text-red-400 hover:text-red-300">Sign Out</button>
        </div>
    </header>

    <!-- Main Vault Grid Container -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-6 sm:p-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Your Private Pictures</h2>
            <!-- Upload Trigger -->
            <label class="cursor-pointer bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-xl text-sm font-medium transition shadow-lg">
                Upload Photo
                <input type="file" id="photoUploadInput" class="hidden" accept="image/*" onchange="uploadPhoto(this.files[0])">
            </label>
        </div>
        
        <div id="photoGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
            <p class="text-sm text-slate-400 col-span-full">Loading your vault...</p>
        </div>
    </main>

    <!-- Script to pull config and load gallery -->
    <script src="aws-config.js"></script>
    <script>
        async function loadPhotosPage() {
            try {
                const response = await fetch(`${awsConfig.apiGatewayUrl}/upload`, {
                    method: 'GET',
                    headers: { 'Authorization': localStorage.getItem('idToken') }
                });
                const data = await response.json();
                const grid = document.getElementById('photoGrid');
                grid.innerHTML = '';

                if (!data.photos || data.photos.length === 0) {
                    grid.innerHTML = '<p class="text-sm text-slate-400 col-span-full">No photos found in your vault.</p>';
                    return;
                }

                data.photos.forEach(photo => {
                    const card = document.createElement('div');
                    card.className = 'relative group aspect-square rounded-2xl overflow-hidden bg-slate-900 border border-white/10 shadow-md';
                    card.innerHTML = `<img src="${photo.url}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" />`;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error('Error loading vault photos:', err);
            }
        }

        async function uploadPhoto(file) {
            if (!file) return;
            alert(`Uploading ${file.name}... (Hook up your pre-signed URL upload handler here)`);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        loadPhotosPage();
    </script>
</body>
</html>
